<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">AI i prefabrykacja ścian WALL</title>
  <desc id="desc">Brandowana scena WALL: prefabrykowane elementy z cegły, budowa, transport i realizacja.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#dceaf2"/><stop offset="1" stop-color="#98aebb"/></linearGradient>
    <radialGradient id="sun" cx="78%" cy="16%" r="30%"><stop stop-color="#fff1c7" stop-opacity=".92"/><stop offset="1" stop-color="#fff1c7" stop-opacity="0"/></radialGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency=".85" numOctaves="2" seed="8"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="table" tableValues="0 .18"/></feComponentTransfer></filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity=".28"/></filter>
    <pattern id="brickPattern" width="96" height="44" patternUnits="userSpaceOnUse">
      <rect width="96" height="44" fill="#d4c6b5"/><rect x="2" y="2" width="44" height="18" rx="1" fill="#a64826"/><rect x="50" y="2" width="44" height="18" rx="1" fill="#b9572f"/><rect x="-22" y="24" width="44" height="18" rx="1" fill="#93411f"/><rect x="26" y="24" width="44" height="18" rx="1" fill="#a64826"/><rect x="74" y="24" width="44" height="18" rx="1" fill="#c36536"/>
    </pattern>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#eef2f3"/><stop offset=".45" stop-color="#66727a"/><stop offset="1" stop-color="#252b30"/></linearGradient>
  </defs>
  <rect width="1200" height="760" fill="url(#sky)"/>
  <rect width="1200" height="760" fill="url(#sun)"/>
  <rect y="500" width="1200" height="260" fill="#75685b"/>
  <rect x="95" y="90" width="725" height="515" rx="30" fill="#172332" filter="url(#shadow)"/><path d="M130 140 790 120" stroke="#4aa6cf" stroke-width="3" opacity=".6"/><path d="M130 182 790 158" stroke="#4aa6cf" stroke-width="3" opacity=".6"/><path d="M130 224 790 196" stroke="#4aa6cf" stroke-width="3" opacity=".6"/><path d="M130 266 790 234" stroke="#4aa6cf" stroke-width="3" opacity=".6"/><path d="M130 308 790 272" stroke="#4aa6cf" stroke-width="3" opacity=".6"/><path d="M130 350 790 310" stroke="#4aa6cf" stroke-width="3" opacity=".6"/><path d="M130 392 790 348" stroke="#4aa6cf" stroke-width="3" opacity=".6"/><path d="M130 434 790 386" stroke="#4aa6cf" stroke-width="3" opacity=".6"/><path d="M130 476 790 424" stroke="#4aa6cf" stroke-width="3" opacity=".6"/><path d="M130 518 790 462" stroke="#4aa6cf" stroke-width="3" opacity=".6"/><path d="M130 560 790 500" stroke="#4aa6cf" stroke-width="3" opacity=".6"/><path d="M130 602 790 538" stroke="#4aa6cf" stroke-width="3" opacity=".6"/><rect x="215" y="310" width="340" height="140" rx="8" fill="url(#brickPattern)" opacity="1" filter="url(#shadow)"/><g transform="translate(870 145) scale(0.78)">
      <g transform="translate(0 0) scale(0.7)" fill="#ff4d16">
      <rect width="44" height="30" rx="3"/><rect x="56" width="44" height="30" rx="3"/><rect x="112" width="44" height="30" rx="3"/>
      <rect y="30" width="44" height="30" rx="3"/><rect x="112" y="30" width="44" height="30" rx="3"/><rect x="56" y="60" width="44" height="24" rx="3"/>
    </g>
      <text x="120" y="54" font-family="Arial Black, Impact, sans-serif" font-size="66" font-weight="900" fill="#070a0e" letter-spacing="-4">WALL</text>
      <text x="124" y="84" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#070a0e" opacity=".78" letter-spacing="2">WHEN STRENGTH MATTERS</text>
    </g>
  <rect width="1200" height="760" filter="url(#grain)" opacity=".7"/>
</svg>
